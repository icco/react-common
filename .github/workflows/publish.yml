name: Publish Package to GitHub Packages
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: https://npm.pkg.github.com
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Version and publish
        run: |
          DATE=$(date -u +%Y.1%m%d)
          OLDVERSION=$(jq -r ".version" package.json)
          OLDDATE=$(echo $OLDVERSION | sed 's/\.[^.]*$//')
          OLDINT=$(echo $OLDVERSION | sed 's/^.*\.//')

          INT=1
          if [ "${DATE}" = "${OLDDATE}" ]; then
            INT=$(($OLDINT + 1))
          fi

          VERSION=${DATE}.${INT}
          while npm view "@icco/react-common@${VERSION}" version >/dev/null 2>&1; do
            INT=$((INT + 1))
            VERSION=${DATE}.${INT}
          done
          jq ".version = \"$VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json

          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --quiet --staged || git commit -m "chore: bump version to $(jq -r .version package.json) [skip ci]"
          git pull --rebase origin main
          VERSION=$(jq -r .version package.json)
          git tag "v${VERSION}"
          git push
          git push origin "v${VERSION}"
